# ========================================
# SERVER
# ========================================
server:
  port: 8080

# ========================================
# SPRING CONFIG
# ========================================
spring:
  application:
    name: freelancing-platform

  # DATABASE (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/freelancing_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # EMAIL (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # FILE UPLOAD
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# ========================================
# JWT
# ========================================
app:
  jwt:
    secret: FreelancingPlatformSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2026
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  # FILE STORAGE
  file:
    upload-dir: ./uploads

  # CORS
  cors:
    allowed-origins: http://localhost:5173

# ========================================
# SWAGGER / OPENAPI
# ========================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

# ========================================
# LOGGING
# ========================================
logging:
  level:
    root: INFO
    com.freelancing: DEBUG
    org.hibernate.SQL: WARN
